{% extends "base.html" %}

{% block content %}

<h2>{{ book.title }}</h2>

<p><b>Author:</b> {{ book.author }}</p>
<p><b>Price:</b> {{ book.price }}</p>
<p><b>Description:</b> {{ book.description }}</p>

<a href="{% url 'shop:book_update' book.id %}" class="btn btn-warning">
Edit
</a>

<a href="{% url 'shop:book_delete' book.id %}" class="btn btn-danger">
Delete
</a>

{% endblock %}
